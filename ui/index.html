<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBK Floods</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      background-color: transparent !important;
    }

    body {
      visibility: hidden;
      opacity: 0;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body class="nui-hidden">
  <div id="root" class="hidden">
    <div class="panel">
      <div class="header">
        <div>
          <div class="eyebrow">Emergency Management</div>
          <h1>CBK Flood Monitor</h1>
        </div>
        <div id="alarmBadge" class="badge">ALARM</div>
      </div>

      <div class="metrics">
        <div class="metric">
          <span>Stage</span>
          <strong id="stageName">Idle</strong>
        </div>
        <div class="metric">
          <span>Water Level</span>
          <strong id="waterLevel">0.00 / 200.00</strong>
        </div>
        <div class="metric">
          <span>Next Transition</span>
          <strong id="holdRemaining">00:00</strong>
        </div>
        <div class="metric">
          <span>Status</span>
          <strong id="statusText">Idle</strong>
        </div>
      </div>

      <div class="statusRow">
        <div id="safeState" class="pill">Monitoring</div>
      </div>

      <p id="summary" class="summary">Flood event inactive.</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
